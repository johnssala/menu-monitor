name: Check menus

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: menu-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync with latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run checker
        run: node check-menus.js

      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add snapshots changed-report.json

          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
            exit 0
          fi

          git commit -m "Update menu snapshots"

          for i in 1 2 3; do
            git pull --rebase origin main

            if git push origin main; then
              echo "Push succeeded."
              exit 0
            fi

            echo "Push failed on attempt $i, retrying..."
            sleep 2
          done

          echo "Push failed after 3 attempts."
          exit 1

      - name: Create or update issues for changes
        run: node .github/scripts/report-changes.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}