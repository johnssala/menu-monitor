name: Check menus

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: menu-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run checker
        run: node check-menus.js

      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add snapshots changed-report.json
          git diff --cached --quiet || git commit -m "Update menu snapshots"
          git push

      - name: Create or update issues for changes
        run: |
          node .github/scripts/report-changes.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}